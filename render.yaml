services:
  - type: web
    name: shipshape-backend
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SHIPSHAPE_DATA_FILE
        value: /tmp/shipshape-state.json
      - key: TESTSPRITE_CLI_BIN
        value: testsprite
      - key: TESTSPRITE_TIMEOUT_SECONDS
        value: "900"
      - key: TESTSPRITE_API_KEY
        sync: false
